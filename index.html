<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A-frame Practical Scene</title>
  <script src="scripts/aframe.js"></script>    
  </head>
  <body>
    <a-scene>
    <a-scene shadow="type: pcfsoft">
      
      <a-sky color="#B0E0E6"></a-sky> <a-light type="ambient" color="#bbb" intensity="0.5"></a-light>
      <a-light type="directional" color="#fff" intensity="1.2" position="15 20 15" cast-shadow="true"></a-light>

      <a-plane color="#7BC8A4" rotation="-90 0 0" width="100" height="100" shadow="receive: true"></a-plane>
      
      <a-entity position="0 0 0">
        <a-entity position="0 0 15">
          <a-box position="-8 1 0" width="14" height="2" depth="0.2" color="#F5F5DC" shadow="cast: true"></a-box> <a-box position="8 1 0" width="14" height="2" depth="0.2" color="#F5F5DC" shadow="cast: true"></a-box> <a-box position="-1 1 0" width="0.8" height="2" depth="0.8" color="#A52A2A"></a-box> <a-box position="1 1 0" width="0.8" height="2" depth="0.8" color="#A52A2A"></a-box> <a-box position="0 1.2 0" width="2" height="1.6" depth="0.05" color="#1A1A1A" material="opacity: 0.8; transparent: true"></a-box> 
        </a-entity>
        <a-entity position="0 0 -15"><a-box position="0 1 0" width="30" height="2" depth="0.2" color="#F5F5DC" shadow="cast: true"></a-box><a-box position="-15 1 0" width="0.8" height="2" depth="0.8" color="#A52A2A"></a-box><a-box position="15 1 0" width="0.8" height="2" depth="0.8" color="#A52A2A"></a-box></a-entity>
        <a-entity position="-15 0 0" rotation="0 90 0"><a-box position="0 1 0" width="30" height="2" depth="0.2" color="#F5F5DC" shadow="cast: true"></a-box></a-entity>
        <a-entity position="15 0 0" rotation="0 90 0"><a-box position="0 1 0" width="30" height="2" depth="0.2" color="#F5F5DC" shadow="cast: true"></a-box></a-entity>
      </a-entity>

      <a-plane color="#C19A6B" rotation="-90 0 0" position="0 0.05 10" width="1.8" height="10"></a-plane>
      <a-entity position="-3 0 10"><a-sphere position="0 0.4 0" radius="0.08" color="#FF1493"></a-sphere><a-cylinder radius="0.02" height="0.4" color="#228B22"></a-cylinder></a-entity>
      <a-entity position="3 0 10"><a-sphere position="0 0.4 0" radius="0.08" color="#FFD700"></a-sphere><a-cylinder radius="0.02" height="0.4" color="#228B22"></a-cylinder></a-entity>

      <a-entity position="0 0 0">
        <a-cylinder position="0 0.1 0" radius="4" height="0.2" segments-radial="8" color="#DEB887" shadow="receive: true"></a-cylinder>
        <a-cone position="0 3.5 0" radius-bottom="4.5" radius-top="0.2" height="1.5" segments-radial="8" color="#DAA520" shadow="cast: true"></a-cone>
        <a-cylinder position="2.8 1.8 2.8" radius="0.1" height="3.5" color="#8B4513" shadow="cast: true"></a-cylinder><a-cylinder position="-2.8 1.8 2.8" radius="0.1" height="3.5" color="#8B4513" shadow="cast: true"></a-cylinder><a-cylinder position="2.8 1.8 -2.8" radius="0.1" height="3.5" color="#8B4513" shadow="cast: true"></a-cylinder><a-cylinder position="-2.8 1.8 -2.8" radius="0.1" height="3.5" color="#8B4513" shadow="cast: true"></a-cylinder>
        
        <a-entity position="0 0.6 0">
          <a-box width="2" height="0.05" depth="1" color="#5C4033" shadow="cast: true"></a-box>
          <a-box position="0.8 -0.3 0.4" width="0.05" height="0.6" depth="0.05" color="#5C4033"></a-box><a-box position="-0.8 -0.3 0.4" width="0.05" height="0.6" depth="0.05" color="#5C4033"></a-box><a-box position="0.8 -0.3 -0.4" width="0.05" height="0.6" depth="0.05" color="#5C4033"></a-box><a-box position="-0.8 -0.3 -0.4" width="0.05" height="0.6" depth="0.05" color="#5C4033"></a-box>
          <a-cylinder position="-0.4 0.1 0" radius="0.08" height="0.2" color="#008000"></a-cylinder> <a-cylinder position="-0.1 0.08 0.1" radius="0.06" height="0.12" color="#FFFFF0"></a-cylinder> <a-cylinder position="0.3 0.07 -0.1" radius="0.05" height="0.1" color="#4682B4"></a-cylinder> <a-cylinder position="0.6 0.07 0.1" radius="0.05" height="0.1" color="#B22222"></a-cylinder> </a-entity>
        <a-entity position="0 0 -1.5" rotation="0 180 0"><a-box position="0 0.4 0" width="0.6" height="0.05" depth="0.6" color="#8B4513" shadow="cast: true"></a-box><a-box position="0 0.7 0.27" width="0.6" height="0.6" depth="0.05" color="#8B4513"></a-box><a-box position="0.25 0.2 0.25" width="0.05" height="0.4" depth="0.05" color="#5C4033"></a-box><a-box position="-0.25 0.2 0.25" width="0.05" height="0.4" depth="0.05" color="#5C4033"></a-box><a-box position="0.25 0.2 -0.25" width="0.05" height="0.4" depth="0.05" color="#5C4033"></a-box><a-box position="-0.25 0.2 -0.25" width="0.05" height="0.4" depth="0.05" color="#5C4033"></a-box></a-entity>
        <a-entity position="0 0 1.5"><a-box position="0 0.4 0" width="0.6" height="0.05" depth="0.6" color="#8B4513" shadow="cast: true"></a-box><a-box position="0 0.7 0.27" width="0.6" height="0.6" depth="0.05" color="#8B4513"></a-box><a-box position="0.25 0.2 0.25" width="0.05" height="0.4" depth="0.05" color="#5C4033"></a-box><a-box position="-0.25 0.2 0.25" width="0.05" height="0.4" depth="0.05" color="#5C4033"></a-box><a-box position="0.25 0.2 -0.25" width="0.05" height="0.4" depth="0.05" color="#5C4033"></a-box><a-box position="-0.25 0.2 -0.25" width="0.05" height="0.4" depth="0.05" color="#5C4033"></a-box></a-entity>
      </a-entity>

      <a-entity position="9 0 -2">
        <a-box position="0 0.01 0" width="6.5" height="0.1" depth="10.5" color="#D3D3D3"></a-box>
        <a-plane position="0 0.06 0" rotation="-90 0 0" width="6" height="10" color="#00BFFF" material="opacity: 0.7; transparent: true"></a-plane>
        <a-box position="0 0.5 5.2" width="1" height="0.1" depth="2" color="#FFFFFF" shadow="cast: true"></a-box>
        <a-box position="0 0.25 6" width="1" height="0.5" depth="0.2" color="#A9A9A9"></a-box>
        <a-entity position="-2 0 6" rotation="0 15 0">
          <a-box width="1" height="0.1" depth="2.5" color="white"></a-box>
          <a-box position="0 0.3 -1" rotation="-45 0 0" width="1" height="0.1" depth="1" color="white"></a-box>
        </a-entity>
      </a-entity>

      <a-entity position="-8 0 -8"> <a-cylinder radius="0.3" height="3" color="#8B4513"></a-cylinder><a-sphere position="0 3 0" radius="2" color="#2E8B57"></a-sphere>
        <a-entity position="2 0 1"><a-cylinder radius="0.2" height="2" color="#8B4513"></a-cylinder><a-sphere position="0 2 0" radius="1.3" color="#3CB371"></a-sphere></a-entity>
        <a-entity position="-1 0 3"><a-cylinder radius="0.1" height="1.5" color="#8B4513"></a-cylinder><a-sphere position="0 1.5 0" radius="1" color="#3CB371"></a-sphere></a-entity>
      </a-entity>
      
      <a-entity position="-10 0 10"> <a-cylinder radius="0.2" height="2" color="#8B4513"></a-cylinder><a-sphere position="0 2 0" radius="1.5" color="#2E8B57"></a-sphere>
        <a-entity position="2 0 -1"><a-cylinder radius="0.1" height="1.5" color="#8B4513"></a-cylinder><a-sphere position="0 1.5 0" radius="1" color="#3CB371"></a-sphere></a-entity>
      </a-entity>
      
      <a-entity position="12 0 8"> <a-cylinder radius="0.3" height="3" color="#8B4513"></a-cylinder><a-sphere position="0 3 0" radius="2" color="#2E8B57"></a-sphere>
      </a-entity>

      <a-sphere position="15 20 15" radius="1.5" color="#FFD700" material="shader: flat; opacity: 1"></a-sphere>

      <a-entity position="-15 25 -10">
        <a-sphere position="0 0 0" radius="2" color="white" opacity="0.8"></a-sphere>
        <a-sphere position="2 0 0" radius="1.5" color="white" opacity="0.8"></a-sphere>
        <a-sphere position="-1.5 0.5 0" radius="1.2" color="white" opacity="0.8"></a-sphere>
      </a-entity>
      <a-entity position="10 22 -15">
        <a-sphere position="0 0 0" radius="2.5" color="white" opacity="0.7"></a-sphere>
        <a-sphere position="-2 0 0" radius="1.8" color="white" opacity="0.7"></a-sphere>
      </a-entity>
      
      <a-entity position="0 18 0" animation="property: rotation; to: 0 360 0; dur: 15000; easing: linear; loop: true">
        <a-entity position="12 0 0">
           <a-plane color="#333" width="0.5" height="0.1" rotation="0 0 20" animation="property: rotation; from: 0 0 20; to: 0 0 -20; dir: alternate; dur: 300; loop: true"></a-plane>
           <a-plane color="#333" width="0.5" height="0.1" position="0.5 0 0" rotation="0 0 -20" animation="property: rotation; from: 0 0 -20; to: 0 0 20; dir: alternate; dur: 300; loop: true"></a-plane>
        </a-entity>
        <a-entity position="10 2 -5">
           <a-plane color="#000" width="0.4" height="0.1" rotation="0 0 20" animation="property: rotation; from: 0 0 20; to: 0 0 -20; dir: alternate; dur: 350; loop: true"></a-plane>
           <a-plane color="#000" width="0.4" height="0.1" position="0.4 0 0" rotation="0 0 -20" animation="property: rotation; from: 0 0 -20; to: 0 0 20; dir: alternate; dur: 350; loop: true"></a-plane>
        </a-entity>
      </a-entity>

      <a-entity position="-40 22 -25" animation="property: position; to: 40 22 -25; dur: 12000; easing: linear; loop: true">
        <a-entity position="0 0 0">
          <a-plane color="#222" width="0.6" height="0.1" rotation="0 0 20" animation="property: rotation; from: 0 0 20; to: 0 0 -20; dir: alternate; dur: 400; loop: true"></a-plane>
          <a-plane color="#222" width="0.6" height="0.1" position="0.6 0 0" rotation="0 0 -20" animation="property: rotation; from: 0 0 -20; to: 0 0 20; dir: alternate; dur: 400; loop: true"></a-plane>
        </a-entity>
        <a-entity position="-2 -1 2">
          <a-plane color="#444" width="0.5" height="0.1" rotation="0 0 20" animation="property: rotation; from: 0 0 20; to: 0 0 -20; dir: alternate; dur: 380; loop: true"></a-plane>
          <a-plane color="#444" width="0.5" height="0.1" position="0.5 0 0" rotation="0 0 -20" animation="property: rotation; from: 0 0 -20; to: 0 0 20; dir: alternate; dur: 380; loop: true"></a-plane>
        </a-entity>
      </a-entity>
      <a-entity position="0 20 -20" particle-system="
        preset: default; 
        color: #FFFFFF; 
        size: 2; 
        velocityValue: 0 0.2 0; 
        maxParticleCount: 15; 
        blending: normal; 
        opacity: 0.9;
        texture: clouds.png">
      </a-entity>
      
      <a-entity position="10 20 0" particle-system="preset: default; color: #F8F8F8; size: 2.5; velocityValue: -0.1 0.1 0; maxParticleCount: 10; opacity: 0.8; texture: clouds.png"></a-entity>
      <a-entity position="-15 15 10" particle-system="preset: default; color: #FFFFFF; size: 1.8; velocityValue: 0.2 0 0; maxParticleCount: 8; opacity: 0.95; texture: clouds.png"></a-entity>

      <a-entity position="0 10 25" rotation="-25 0 0">
        <a-camera></a-camera>
      </a-entity>
      
    </a-scene>
  </body>
</html>
